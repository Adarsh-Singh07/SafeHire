<!DOCTYPE html>
<html>
<head>
  <title>SafeHire AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="Logo" class="logo">
    <h1>SafeHire AI</h1>
  </div>
  
  <div class="status-container">
    <div class="status-indicator active"></div>
    <span>AI Engine Active on Job Boards</span>
  </div>

  <div class="dashboard">
    <h2>Recent Audits</h2>
    <div id="history-container">
      <div class="empty-state">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="2" style="margin-bottom: 8px;">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
        <div>No jobs scanned yet. <br/>Browse LinkedIn or Indeed!</div>
      </div>
    </div>
  </div>

  <div class="footer">
    <p>Zero-Cost Local Intelligence</p>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
